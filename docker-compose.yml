services:
  postgres:
    image: postgres:16
    container_name: BIMFree_postgres
    restart: always
    environment:
      POSTGRES_USER: nullpo
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: BIMFree_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: